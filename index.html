<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>Casus Liber</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Playfair+Display:ital,wght@0,600;1,500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #ffffff;
        --ink: #1c1c1c;
        --ink-faint: #8a8a8a;
        --pen-red: #b3261e;
        --gold: #a9812f;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        background: var(--paper);
        font-family: "Special Elite", monospace;
        color: var(--ink);
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        position: fixed;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        touch-action: none;
      }
      .titlebar {
        position: fixed;
        top: max(16px, env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        pointer-events: none;
        opacity: 0.9;
        z-index: 5;
        width: min(92vw, 360px);
      }
      .titlebar h1 {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-weight: 900;
        font-size: clamp(16px, 3.8vw, 22px);
        letter-spacing: 0.5px;
        margin: 0 0 2px;
        color: var(--ink);
        text-transform: uppercase;
      }
      .titlebar p {
        margin: 0;
        font-size: clamp(8px, 1.7vw, 10px);
        color: var(--ink-faint);
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .hud {
        position: fixed;
        top: max(16px, env(safe-area-inset-top));
        right: 14px;
        display: flex;
        gap: 12px;
        align-items: center;
        font-size: clamp(10px, 1.4vw, 12px);
        color: var(--ink-faint);
        letter-spacing: 0.5px;
        pointer-events: none;
        opacity: 0.85;
        z-index: 5;
      }
      .hud b {
        color: var(--pen-red);
        font-style: normal;
      }
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
        text-align: center;
        gap: 10px;
        padding: 20px;
        backdrop-filter: blur(2px);
      }
      .overlay h2 {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 28px;
        margin: 0;
      }
      .overlay p {
        margin: 0;
        font-size: 13px;
        opacity: 0.8;
        max-width: 380px;
        line-height: 1.5;
      }
      .btn {
        margin-top: 8px;
        font-family: "Special Elite", monospace;
        background: var(--pen-red);
        color: #fff;
        border: none;
        padding: 10px 18px;
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
      }
      .btn:hover {
        background: #8f1f18;
      }
      .hidden {
        display: none !important;
      }

      /* ---------- Fundido a blanco al terminar el último nivel ---------- */
      .fade-overlay {
        position: fixed;
        inset: 0;
        background: #ffffff;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.4s ease;
        z-index: 999;
      }
      .fade-overlay.active {
        opacity: 1;
      }

      /* ---------- Globito de instrucciones (esquina inferior izquierda) ---------- */
      .help-bubble {
        position: fixed;
        right: 20px;
        bottom: max(28px, env(safe-area-inset-bottom));
        z-index: 6;
        pointer-events: none;
        opacity: 0.68;
        transition: opacity 0.6s ease;
      }
      .help-bubble.fade-out,
      .mobile-tip.fade-out {
        opacity: 0;
      }
      .help-text {
        font-family: "Special Elite", monospace;
        font-size: 11px;
        color: var(--ink);
        letter-spacing: 0.3px;
        text-align: center;
        margin: 0 0 8px;
      }
      .help-keys {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .help-or {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 11px;
        color: var(--ink);
      }
      .keypad {
        display: flex;
        gap: 4px;
      }
      .keycap {
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Special Elite", monospace;
        font-size: 11px;
        font-weight: bold;
        color: #333;
        background: linear-gradient(to bottom, #ffffff, #e2e2e2);
        border: 1px solid #999;
        border-radius: 5px;
        box-shadow:
          0 2px 0 #8a8a8a,
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        transition:
          transform 0.06s ease,
          box-shadow 0.06s ease,
          background 0.06s ease;
        user-select: none;
      }
      .keycap.pressed {
        transform: translateY(2px);
        background: linear-gradient(to bottom, #e6e6e6, #d4d4d4);
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
      }
      .mobile-tip,
      .mobile-btn {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        z-index: 6;
      }
      .mobile-tip {
        bottom: max(76px, calc(env(safe-area-inset-bottom) + 52px));
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(28, 28, 28, 0.16);
        padding: 8px 14px;
        border-radius: 999px;
        font-family: "Special Elite", monospace;
        font-size: 11px;
        letter-spacing: 0.3px;
        color: var(--ink);
        text-align: center;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        white-space: nowrap;
        transition: opacity 0.6s ease;
      }
      .mobile-btn {
        bottom: max(28px, calc(env(safe-area-inset-bottom) + 8px));
        margin-top: 0;
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 11px;
      }
      @media (max-width: 700px) {
        #game {
          inset: 2rem;
          width: calc(100vw - 4rem);
          height: calc(100vh - 4rem);
          height: calc(100dvh - 4rem);
        }
        .titlebar {
          width: min(92vw, 320px);
        }
        .titlebar h1 {
          font-size: 17px;
        }
        .titlebar p {
          font-size: 7px;
        }
        .hud {
          top: auto;
          bottom: max(12px, env(safe-area-inset-bottom));
          left: 50%;
          right: auto;
          transform: translateX(-50%);
          gap: 8px;
          flex-wrap: wrap;
          justify-content: center;
        }
        .hud span {
          background: rgba(255, 255, 255, 0.84);
          padding: 2px 6px;
          border-radius: 999px;
        }
        .help-bubble {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div class="fade-overlay" id="fadeOverlay"></div>

    <div class="mobile-tip" id="mobileTip">
      Deslizá el dedo hacia los costados para moverte y hacia arriba para saltar
    </div>
    <button class="btn mobile-btn hidden" id="sensorButton" type="button">
      Activar giroscopio
    </button>

    <div class="help-bubble" id="helpBubble">
      <p class="help-text">Ad movendum, utere</p>
      <div class="help-keys">
        <div class="keypad">
          <span class="keycap" data-key="ArrowLeft">←</span>
          <span class="keycap" data-key="ArrowUp">↑</span>
          <span class="keycap" data-key="ArrowRight">→</span>
        </div>
        <span class="help-or">vel</span>
        <div class="keypad">
          <span class="keycap" data-key="a">A</span>
          <span class="keycap" data-key="w">W</span>
          <span class="keycap" data-key="d">D</span>
        </div>
      </div>
    </div>

    <!-- ---------- Niveles: cargados desde archivos externos ----------
         Cada archivo niveles/nivelN.js llena window.LEVELS[N-1] con el
         array de líneas de ese nivel (lo genera el editor de grilla).
         Para agregar (o quitar) un nivel: guardá/borrá el archivo
         nivelN.js en la carpeta niveles/ y actualizá el número de acá
         abajo (window.LEVEL_COUNT) para que coincida con la cantidad
         total de niveles numerados que tenés. Es el único lugar que hay
         que tocar.

         nivelfinal.js SIEMPRE se carga aparte, después de todos los
         niveles numerados: es fijo, siempre el último nivel del juego.
         Al tocar la flecha derecha en ese nivel, el juego se funde a
         blanco y se reinicia (en vez de volver en bucle al nivel 1). -->
    <script>
      window.LEVELS = [];
      // Título opcional por nivel (2 en adelante): lo llena nivelN.js con
      // window.LEVEL_TITLES[N-1] = "..." si el creador eligió ponerle uno
      // en el editor. El nivel 1 siempre usa "Casus liber" fijo, sin
      // importar lo que haya acá.
      window.LEVEL_TITLES = [];
      window.LEVEL_COUNT = 9; // <- cambiá este número al agregar/quitar niveles numerados
      for (let n = 1; n <= window.LEVEL_COUNT; n++) {
        document.write('<script src="niveles/nivel' + n + '.js"><\/script>');
      }
      // Nivel final: fijo, siempre el último. Se carga después de los
      // niveles numerados de arriba y ocupa el índice window.LEVEL_COUNT.
      document.write('<script src="niveles/nivelfinal.js"><\/script>');
    </script>

    <script>
      (() => {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const mobileTip = document.getElementById("mobileTip");
        const sensorButton = document.getElementById("sensorButton");
        const helpBubble = document.getElementById("helpBubble");
        let W = window.innerWidth,
          H = window.innerHeight;
        // "viewW"/"viewH" son el ancho/alto REAL del mundo que entra en
        // pantalla (en unidades de juego). En desktop coinciden con W/H
        // (GAME_SCALE = 1, todo queda exactamente como estaba). En
        // pantallas angostas (celular, tablet en vertical) se activa un
        // GAME_SCALE < 1: en vez de recortar el texto por los costados,
        // la cámara se "aleja" lo justo para que siempre se vea el mismo
        // ancho de página (columna + flechas de navegación) que en
        // escritorio, solo que todo un poco más chico. Así el celular
        // muestra el equivalente exacto del canvas de escritorio.
        let viewW = W,
          viewH = H;
        let GAME_SCALE = 1;
        // -------------------- ancho mínimo visible del "mundo" --------------------
        // Tiene que alcanzar para mostrar la columna de texto (450px) MÁS el
        // espacio que ocupan las flechas de navegación a los costados
        // (72px a la izquierda, ~62px a la derecha respecto del borde de la
        // columna). Si este valor es demasiado chico, las flechas quedan
        // literalmente fuera del canvas en pantallas angostas (por eso no
        // se veían en celulares). Mínimo matemático real: ~594. Se deja
        // con un margen chico (620) para no recortarlas justo en el borde.
        const MIN_VISIBLE_WIDTH = 620; // antes 480 (muy chico, tapaba las flechas) / 660 (original)
        let tiltX = 0;
        let useTilt = false;
        const isTouchDevice =
          window.matchMedia("(pointer: coarse)").matches ||
          "ontouchstart" in window;
        const needsOrientationPermission =
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function";

        if (helpBubble) {
          if (isTouchDevice) {
            helpBubble.classList.add("hidden");
          } else {
            setTimeout(() => helpBubble.classList.add("fade-out"), 2000);
          }
        }

        function resizeCanvas() {
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const rect = canvas.getBoundingClientRect();
          W = rect.width;
          H = rect.height;
          GAME_SCALE = Math.min(1, W / MIN_VISIBLE_WIDTH);
          viewW = W / GAME_SCALE;
          viewH = H / GAME_SCALE;
          canvas.width = Math.round(W * dpr);
          canvas.height = Math.round(H * dpr);
          ctx.setTransform(dpr * GAME_SCALE, 0, 0, dpr * GAME_SCALE, 0, 0);
        }
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("orientationchange", resizeCanvas);

        let mobileTipFadeScheduled = false;
        function updateTiltUi() {
          if (!mobileTip) return;
          const showHint = isTouchDevice && !useTilt;
          mobileTip.classList.toggle("hidden", !showHint);
          if (showHint && !mobileTipFadeScheduled) {
            mobileTipFadeScheduled = true;
            setTimeout(() => mobileTip.classList.add("fade-out"), 2000);
          }
          if (sensorButton) {
            sensorButton.classList.toggle(
              "hidden",
              !isTouchDevice || useTilt || !needsOrientationPermission,
            );
          }
        }

        // cuántos grados de inclinación hacen falta para llegar a velocidad
        // máxima: cuanto más alto, MENOS sensible es el sensor (hace falta
        // inclinar más el celular para el mismo efecto)
        const TILT_MAX_DEGREES = 70; // antes 45 (muy sensible, se disparaba con cualquier movimiento)
        function handleOrientation(event) {
          if (typeof event.gamma === "number") {
            tiltX = Math.max(-1, Math.min(1, event.gamma / TILT_MAX_DEGREES));
          }
        }

        function enableTiltControl() {
          if (!window.DeviceOrientationEvent) return;
          if (typeof DeviceOrientationEvent.requestPermission === "function") {
            sensorButton.textContent = "Activando...";
            DeviceOrientationEvent.requestPermission()
              .then((response) => {
                if (response === "granted") {
                  useTilt = true;
                  updateTiltUi();
                  mobileTip.textContent =
                    "Deslizá el dedo hacia los costados para moverte y hacia arriba para saltar";
                } else {
                  sensorButton.textContent = "Activar giroscopio";
                  mobileTip.textContent = "No se pudo activar el giroscopio";
                }
              })
              .catch(() => {
                sensorButton.textContent = "Activar giroscopio";
                mobileTip.textContent = "No se pudo activar el giroscopio";
              });
          } else {
            useTilt = true;
            updateTiltUi();
          }
        }

        if (window.DeviceOrientationEvent) {
          window.addEventListener("deviceorientation", handleOrientation);
          if (needsOrientationPermission) {
            sensorButton?.addEventListener("click", enableTiltControl);
            updateTiltUi();
          } else {
            useTilt = true;
            updateTiltUi();
          }
        } else {
          mobileTip.textContent = "Tu dispositivo no soporta inclinación";
        }

        // ---------- Texto fuente tomado del PDF de Casus Liber ----------
        // Cada elemento de LEVELS es un nivel (capítulo) completo: un array de
        // hasta 24 líneas (50 caracteres c/u), cargado desde niveles/*.js.
        // Al tocar la flecha derecha se avanza al siguiente elemento de este
        // array; si no hay más niveles cargados, se repite el último.
        const LEVELS = window.LEVELS || [];
        // ---------- Parámetros de layout tipográfico ----------
        const FONT_SIZE = 14;
        const CHAR_W = 9; // ancho de caracter (monoespaciado)
        const PLATFORM_W = 7.5; // ancho real de colisión de cada letra (deja huequito chico)
        const PLATFORM_H = 4;
        const LINE_H = 26; // separación vertical entre líneas (hay que saltar)
        const CHARS_PER_LINE = 50;
        const LINES_PER_COL = 26;
        const NUM_COLS = 1;
        const COL_GAP = 120; // vacío entre columnas (sin efecto con 1 columna)
        const PAGE_TOP = 90;
        const COL_LEFT_START = 60;
        // Fila (0-indexada, incluyendo el título en la fila 0) donde va la flecha
        // de "siguiente". null = fila del medio (comportamiento actual). A futuro
        // esto se podrá elegir por página; por ahora es un único valor acá arriba.
        const NAV_ROW_INDEX = null;

        // ---------- Sonido: notas en orden 1→6, una por cada renglón nuevo pisado ----------
        const NOTE_COUNT = 6;
        const noteBuffers = [];
        for (let i = 1; i <= NOTE_COUNT; i++) {
          const a = new Audio(`notas/${i}.m4a`);
          a.preload = "auto";
          noteBuffers.push(a);
        }
        let noteCursor = 0;
        function playNextNote() {
          const base = noteBuffers[noteCursor % noteBuffers.length];
          noteCursor++;
          // clonamos el nodo para poder superponer sonidos si caen renglones rápido
          const node = base.cloneNode();
          node.volume = 0.12;
          node.play().catch(() => {}); // si falta el archivo o el navegador bloquea autoplay, no rompe el juego
        }

        // ---------- Sonido: notas en orden 1→4, una por cada choque con una flecha ----------
        const NAV_NOTE_COUNT = 4;
        const navNoteBuffers = [];
        for (let i = 1; i <= NAV_NOTE_COUNT; i++) {
          const a = new Audio(`notas/siguiente/${i}.m4a`);
          a.preload = "auto";
          navNoteBuffers.push(a);
        }
        let navNoteCursor = 0;
        function playNextNavNote() {
          const base = navNoteBuffers[navNoteCursor % navNoteBuffers.length];
          navNoteCursor++;
          const node = base.cloneNode();
          node.volume = 0.35;
          node.play().catch(() => {}); // si falta el archivo o el navegador bloquea autoplay, no rompe el juego
        }

        // los niveles van en bucle: al llegar al final del último, se
        // vuelve a empezar desde el nivel 1 (en vez de repetir el
        // último para siempre)
        function getLevelIndex(pageIdx) {
          return LEVELS.length > 0
            ? (((pageIdx || 0) % LEVELS.length) + LEVELS.length) % LEVELS.length
            : 0;
        }

        // Título de un nivel: el nivel 1 (índice 0) siempre es "Casus
        // liber", fijo. Del nivel 2 en adelante, el título es el que haya
        // elegido el creador en el editor (window.LEVEL_TITLES), o "" si no
        // eligió ninguno (en ese caso esa fila queda vacía / sin título).
        function getLevelTitle(levelIdx) {
          if (levelIdx === 0) return "Casus liber";
          const titles = window.LEVEL_TITLES || [];
          return titles[levelIdx] || "";
        }

        function wrapColumnLines(pageIdx) {
          const levelIdx = getLevelIndex(pageIdx);
          const blocks = LEVELS[levelIdx] || [];
          const lines = [];
          for (let i = 0; i < LINES_PER_COL; i++) {
            if (i === 0) {
              lines.push(getLevelTitle(levelIdx));
            } else if (i === 1) {
              lines.push("");
            } else {
              const raw = blocks[i - 2] || "";
              // "(*)" es solo una marca (indica en qué fila va la flecha de
              // "siguiente"), nunca una plataforma real: se saca del texto
              lines.push(raw.slice(0, CHARS_PER_LINE).replace(/\(\*\)/g, ""));
            }
          }
          return lines;
        }

        // Busca "(*)" (marcador de fila para la flecha derecha) en el
        // contenido crudo de un nivel. Devuelve la fila "de mundo" (ya
        // contando las 2 filas reservadas de título/blanco) donde está, o
        // null si el nivel no tiene marcador.
        function getNavMarkerRow(levelIdx) {
          const blocks = LEVELS[levelIdx] || [];
          for (let i = 0; i < blocks.length; i++) {
            const raw = (blocks[i] || "").slice(0, CHARS_PER_LINE);
            if (raw.indexOf("(*)") !== -1) return i + 2;
          }
          return null;
        }

        // ---------- Generación de una página (nivel) ----------
        function buildPage(pageIdx) {
          // si este nivel no tiene título (nivel 2+ sin elegir uno en el
          // editor), la fila 0 queda como texto normal en vez de con el
          // estilo grande/negrita reservado al título
          const hasTitle = !!getLevelTitle(getLevelIndex(pageIdx));
          const columns = [];
          for (let c = 0; c < NUM_COLS; c++) {
            columns.push(wrapColumnLines(pageIdx));
          }
          const platforms = [];

          for (let c = 0; c < NUM_COLS; c++) {
            const colX =
              COL_LEFT_START + c * (CHARS_PER_LINE * CHAR_W + COL_GAP);
            for (let r = 0; r < LINES_PER_COL; r++) {
              const line = columns[c][r];
              const y = PAGE_TOP + r * LINE_H;

              // "palabra" = uno o más caracteres no-espacio seguidos (un
              // caracter solo también cuenta como palabra); se usa para
              // saber cuándo suena una nota al aterrizar: una vez por
              // palabra, no una vez por renglón
              const wordRuns = [];
              let runStart = null;
              for (let i = 0; i <= line.length; i++) {
                const isChar = i < line.length && line[i] !== " ";
                if (isChar) {
                  if (runStart === null) runStart = i;
                } else if (runStart !== null) {
                  wordRuns.push(runStart);
                  runStart = null;
                }
              }
              function wordIdAt(i) {
                for (const start of wordRuns) {
                  // un run termina en el primer espacio o fin de línea
                  // después de "start"; buscamos si "i" cae dentro
                  let end = start;
                  while (end < line.length && line[end] !== " ") end++;
                  if (i >= start && i < end) return `${c}-${r}-${start}`;
                }
                return null;
              }

              for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === " ") continue;
                const x = colX + i * CHAR_W;
                const plat = {
                  x: x + (CHAR_W - PLATFORM_W) / 2,
                  y: y,
                  w: PLATFORM_W,
                  h: PLATFORM_H,
                  char: ch,
                  colIndex: c,
                  rowIndex: r,
                  charIndex: i,
                  isTitle: r === 0 && hasTitle,
                  wordId: wordIdAt(i),
                };
                platforms.push(plat);
              }
            }
          }

          const worldWidth =
            COL_LEFT_START * 2 +
            NUM_COLS * (CHARS_PER_LINE * CHAR_W) +
            (NUM_COLS - 1) * COL_GAP;
          const worldBottom =
            PAGE_TOP + (LINES_PER_COL - 1) * LINE_H + LINE_H * 1.6; // debajo de esto = vacío/muerte

          // La flecha IZQUIERDA (capítulo anterior) se queda donde siempre
          // estuvo: en la fila del medio del nivel (comportamiento original),
          // salvo que se fuerce NAV_ROW_INDEX a otro valor.
          const midRowIndex = Math.round((LINES_PER_COL - 1) / 2);
          const navRowIndex =
            NAV_ROW_INDEX !== null ? NAV_ROW_INDEX : midRowIndex;
          const navRowY = PAGE_TOP + navRowIndex * LINE_H;

          // La flecha DERECHA (siguiente): si el nivel tiene un marcador
          // "(*)" en el editor, va en ESA fila, pegada al MARGEN DERECHO
          // de la grilla (no al último caracter de esa fila). Si no hay
          // marcador, sigue el comportamiento de siempre: la ÚLTIMA fila
          // del nivel que tenga contenido (buscando de abajo hacia
          // arriba), pegada al último caracter real de esa fila. En
          // cualquier caso se separa con el mismo margen (NAV_GAP_RIGHT).
          const lastColIndex = NUM_COLS - 1;
          const lastColX =
            COL_LEFT_START + lastColIndex * (CHARS_PER_LINE * CHAR_W + COL_GAP);
          const rightMarginX = lastColX + CHARS_PER_LINE * CHAR_W;

          function findLastContentRow() {
            for (let r = LINES_PER_COL - 1; r >= 0; r--) {
              const line = columns[lastColIndex][r] || "";
              for (let i = 0; i < line.length; i++) {
                if (line[i] !== " ") return r;
              }
            }
            // nivel completamente vacío (ni siquiera el título): fila del medio
            return midRowIndex;
          }

          const markerRow = getNavMarkerRow(getLevelIndex(pageIdx));
          let rightNavRowIndex, navRowLastCharEndX;
          if (markerRow !== null) {
            rightNavRowIndex = markerRow;
            navRowLastCharEndX = rightMarginX; // ancla al margen derecho, no al texto
          } else {
            rightNavRowIndex = findLastContentRow();
            const rightNavRowText =
              columns[lastColIndex][rightNavRowIndex] || "";
            navRowLastCharEndX = lastColX; // fila vacía -> la flecha queda pegada al inicio de la columna
            for (let i = rightNavRowText.length - 1; i >= 0; i--) {
              if (rightNavRowText[i] !== " ") {
                navRowLastCharEndX = lastColX + (i + 1) * CHAR_W;
                break;
              }
            }
          }
          const rightNavRowY = PAGE_TOP + rightNavRowIndex * LINE_H;

          return {
            columns,
            platforms,
            navRowIndex,
            navRowY,
            rightNavRowIndex,
            rightNavRowY,
            navRowLastCharEndX,
            worldWidth,
            worldBottom,
            startX: COL_LEFT_START + 0 * CHAR_W,
            startY: PAGE_TOP - 20,
          };
        }

        // ---------- Estado del juego ----------
        let page = buildPage(0);
        let pageHistory = [page];
        let pageIndex = 0;
        let pageNum = 1;
        let deaths = 0;

        const player = {
          x: page.startX,
          y: page.startY,
          w: 9,
          h: 9,
          vx: 0,
          vy: 0,
          onGround: false,
          facing: 1,
        };

        const GRAVITY = 0.25;
        const MOVE_SPEED = 3.0;
        const JUMP_VELOCITY = -10.5;
        const FRICTION = 0.84;

        const keys = {};
        window.addEventListener("keydown", (e) => {
          if (["ArrowLeft", "ArrowRight", "ArrowUp", " "].includes(e.key))
            e.preventDefault();
          keys[e.key] = true;
          setKeycapPressed(e.key, true);
        });
        window.addEventListener("keyup", (e) => {
          keys[e.key] = false;
          setKeycapPressed(e.key, false);
        });

        // ---------- Control táctil ----------
        // - Deslizar el dedo hacia ARRIBA en cualquier parte del canvas = saltar.
        // - Mientras un dedo está apoyado, arrastrarlo hacia la IZQUIERDA o la
        //   DERECHA desde el punto donde tocó mueve al personaje para ese
        //   mismo lado (como un joystick): cuanto más lejos del punto de
        //   inicio, más rápido se mueve, hasta TOUCH_MOVE_RANGE px.
        // - Además sigue funcionando la inclinación del celular, que se suma
        //   a este control (por si el jugador la prefiere).
        const SWIPE_JUMP_PX = 26; // desplazamiento vertical mínimo para contar como "deslizar hacia arriba"
        const TOUCH_JUMP_BUFFER_FRAMES = 10; // si el deslizamiento llega un poco antes de tocar el piso, igual salta al aterrizar
        const TOUCH_MOVE_RANGE = 60; // px de arrastre horizontal para llegar a la velocidad máxima
        const touchStartY = new Map(); // por cada dedo (id de touch), dónde empezó el gesto (vertical)
        const touchStartX = new Map(); // por cada dedo (id de touch), dónde empezó el gesto (horizontal)
        const touchJumpedAlready = new Map(); // para no disparar más de un salto por gesto/dedo
        let touchJumpBuffer = 0;
        let touchAxis = 0; // -1 (izquierda) a 1 (derecha), según el arrastre del dedo que controla el movimiento
        let dragTouchId = null; // qué dedo controla el movimiento horizontal ahora mismo

        function onTouchStart(e) {
          for (const t of e.changedTouches) {
            touchStartY.set(t.identifier, t.clientY);
            touchStartX.set(t.identifier, t.clientX);
            touchJumpedAlready.set(t.identifier, false);
            if (dragTouchId === null) dragTouchId = t.identifier;
          }
        }
        function onTouchMove(e) {
          for (const t of e.changedTouches) {
            // salto: deslizar hacia arriba
            if (!touchJumpedAlready.get(t.identifier)) {
              const startY = touchStartY.get(t.identifier);
              if (startY !== undefined && startY - t.clientY > SWIPE_JUMP_PX) {
                touchJumpedAlready.set(t.identifier, true);
                touchJumpBuffer = TOUCH_JUMP_BUFFER_FRAMES;
              }
            }
            // movimiento: arrastrar hacia los costados
            if (t.identifier === dragTouchId) {
              const startX = touchStartX.get(t.identifier);
              if (startX !== undefined) {
                const dx = t.clientX - startX;
                touchAxis = Math.max(-1, Math.min(1, dx / TOUCH_MOVE_RANGE));
              }
            }
          }
        }
        function onTouchEnd(e) {
          for (const t of e.changedTouches) {
            touchStartY.delete(t.identifier);
            touchStartX.delete(t.identifier);
            touchJumpedAlready.delete(t.identifier);
            if (t.identifier === dragTouchId) {
              dragTouchId = null;
              touchAxis = 0;
              // si queda otro dedo apoyado, que ese tome el control del movimiento
              for (const id of touchStartX.keys()) {
                dragTouchId = id;
                break;
              }
            }
          }
        }
        canvas.addEventListener("touchstart", onTouchStart, {
          passive: true,
        });
        canvas.addEventListener("touchmove", onTouchMove, { passive: true });
        canvas.addEventListener("touchend", onTouchEnd, { passive: true });
        canvas.addEventListener("touchcancel", onTouchEnd, { passive: true });

        // enciende/apaga el efecto visual de "tecla presionada" en el
        // globito de instrucciones, siguiendo lo que realmente toca el jugador
        function setKeycapPressed(rawKey, isPressed) {
          const key = rawKey.length === 1 ? rawKey.toLowerCase() : rawKey;
          document
            .querySelectorAll(`.keycap[data-key="${key}"]`)
            .forEach((el) => el.classList.toggle("pressed", isPressed));
        }

        function resetPlayerToPageStart() {
          player.x = page.startX;
          player.y = page.startY;
          player.vx = 0;
          player.vy = 0;
          player.onGround = false;
          player.facing = 1;
          lastLandedWordId = null;
          trail = [];
        }

        let lastLandedWordId = null; // última "palabra" (1+ caracteres seguidos, un caracter solo también cuenta) donde aterrizó el jugador

        let camX = getColCenterX() - viewW / 2,
          camY = player.y - viewH / 2 + player.h / 2;
        let gameState = "playing"; // playing
        let trail = [];
        let navCooldown = 0;
        let transitioning = false;
        const HIT_ANIM_FRAMES = 60; // 60 frames ≈ 1 segundo a 60fps
        let navHitLeft = 0,
          navHitRight = 0;
        // datos del impacto real (cómo y dónde chocó el jugador contra la flecha)
        let navImpactLeft = null,
          navImpactRight = null;

        function aabbOverlap(a, b) {
          return (
            a.x < b.x + b.w &&
            a.x + a.w > b.x &&
            a.y < b.y + b.h &&
            a.y + a.h > b.y
          );
        }

        function goToPage(idx, msg) {
          if (idx < 0) return;
          if (idx < pageHistory.length) {
            page = pageHistory[idx];
          } else {
            page = buildPage(idx);
            pageHistory.push(page);
          }
          pageIndex = idx;
          pageNum = idx + 1;
          if (hudPage) hudPage.textContent = pageNum;
          resetPlayerToPageStart();
          camX = getColCenterX() - viewW / 2;
          camY = player.y - viewH / 2 + player.h / 2;
          navCooldown = 45;
          if (hudMsg) {
            hudMsg.textContent = msg;
            setTimeout(() => (hudMsg.textContent = ""), 1200);
          }
        }

        function getColCenterX() {
          return COL_LEFT_START + (CHARS_PER_LINE * CHAR_W) / 2;
        }

        // Se llama al tocar la flecha derecha en el último nivel
        // (nivelfinal.js): funde la pantalla a blanco y, 2 segundos
        // después, reinicia el juego desde el principio.
        const fadeOverlay = document.getElementById("fadeOverlay");
        function endGame() {
          if (fadeOverlay) fadeOverlay.classList.add("active");
          setTimeout(() => {
            location.reload();
          }, 2000);
        }

        const ARROW_L = 14; // largo de la flecha (mismo valor que usa drawNavArrow)
        const NAV_BOX_W = ARROW_L * 2 + 4; // ~32, igual al ancho real del dibujo
        const NAV_BOX_H = ARROW_L + 6; // ~20, igual al alto real del dibujo
        const NAV_GAP = 40; // distancia entre el borde del texto y la flecha izquierda (como siempre)
        // -------------------- CAMBIO 2: flecha derecha más cerca del texto --------------------
        const NAV_GAP_RIGHT = 30; // antes 90

        function getNavBoxes() {
          // izquierda: sigue en la fila del medio del nivel (como siempre),
          // pegada al borde izquierdo de la columna
          const leftScreenY = page.navRowY - camY;
          const leftWorldX = COL_LEFT_START - NAV_GAP - NAV_BOX_W;
          const leftX = leftWorldX - camX;
          // derecha: sigue la ÚLTIMA fila con contenido del nivel, bien
          // alejada (NAV_GAP_RIGHT) del último caracter real de esa fila
          const rightScreenY = page.rightNavRowY - camY;
          const rightWorldX = page.navRowLastCharEndX + NAV_GAP_RIGHT;
          const rightX = rightWorldX - camX;
          return {
            left: {
              x: leftX,
              y: leftScreenY - NAV_BOX_H / 2,
              w: NAV_BOX_W,
              h: NAV_BOX_H,
            },
            right: {
              x: rightX,
              y: rightScreenY - NAV_BOX_H / 2,
              w: NAV_BOX_W,
              h: NAV_BOX_H,
            },
          };
        }

        // calcula cómo golpeó el jugador la caja de navegación: su velocidad
        // en ese instante y en qué punto vertical/horizontal de la caja entró,
        // para que la animación de la flecha varíe según el impacto real
        function makeImpactData(playerScreen, box, dir) {
          const boxCx = box.x + box.w / 2,
            boxCy = box.y + box.h / 2;
          const playerCx = playerScreen.x + playerScreen.w / 2,
            playerCy = playerScreen.y + playerScreen.h / 2;
          return {
            vx: player.vx,
            vy: player.vy,
            offsetY: (playerCy - boxCy) / (box.h / 2), // -1 (arriba) a 1 (abajo)
            offsetX: (playerCx - boxCx) / (box.w / 2), // -1 a 1
            dir,
          };
        }

        // velocidad del rebote al chocar contra una flecha de navegación
        const NAV_KNOCKBACK_VX = 5.5;
        const NAV_KNOCKBACK_VY = -4.5;

        function update() {
          // seguimos corriendo la física (gravedad, movimiento, colisiones)
          // incluso durante "transitioning": lo único que se bloquea más abajo
          // es que se vuelva a disparar el cambio de página o la muerte otra vez.
          if (gameState !== "playing") return;

          // input horizontal
          const moveAxis = Math.max(
            -1,
            Math.min(
              1,
              (keys["ArrowLeft"] || keys["a"] || keys["A"] ? -1 : 0) +
                (keys["ArrowRight"] || keys["d"] || keys["D"] ? 1 : 0) +
                (useTilt ? tiltX * 0.7 : 0) +
                touchAxis,
            ),
          );

          if (moveAxis < -0.15) {
            player.vx -= 0.8 * (Math.abs(moveAxis) + 0.2);
            player.facing = -1;
          }
          if (moveAxis > 0.15) {
            player.vx += 0.8 * (Math.abs(moveAxis) + 0.2);
            player.facing = 1;
          }
          player.vx = Math.max(-MOVE_SPEED, Math.min(MOVE_SPEED, player.vx));
          player.vx *= FRICTION;

          if (touchJumpBuffer > 0) touchJumpBuffer--;
          if (
            (keys[" "] ||
              keys["ArrowUp"] ||
              keys["w"] ||
              keys["W"] ||
              touchJumpBuffer > 0) &&
            player.onGround
          ) {
            player.vy = JUMP_VELOCITY;
            player.onGround = false;
            touchJumpBuffer = 0;
          }

          player.vy += GRAVITY;
          if (player.vy > 16) player.vy = 16;

          // mover en X y resolver colisión
          player.x += player.vx;
          for (const p of page.platforms) {
            if (aabbOverlap(player, p)) {
              if (player.vx > 0) player.x = p.x - player.w;
              else if (player.vx < 0) player.x = p.x + p.w;
              player.vx = 0;
            }
          }

          // mover en Y y resolver colisión (con "barrido": chequea si el
          // jugador cruzó la plataforma durante el movimiento de este
          // frame, no solo si quedó superpuesto al final — así una caída
          // rápida no salta de largo una plataforma finita de 4px)
          const prevBottom = player.y + player.h;
          const prevTop = player.y;
          player.onGround = false;
          player.y += player.vy;
          for (const p of page.platforms) {
            const xOverlap = player.x < p.x + p.w && player.x + player.w > p.x;
            if (!xOverlap) continue;
            if (player.vy > 0) {
              const newBottom = player.y + player.h;
              if (prevBottom <= p.y && newBottom >= p.y) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.onGround = true;
                if (p.wordId !== null) {
                  if (p.wordId !== lastLandedWordId) {
                    lastLandedWordId = p.wordId;
                    playNextNote();
                  }
                } else {
                  // aterrizó en un caracter suelto (no es una "palabra"):
                  // no suena, y además olvida la última palabra para que,
                  // si vuelve a esa misma palabra más tarde, vuelva a sonar
                  lastLandedWordId = null;
                }
              }
            } else if (player.vy < 0) {
              const newTop = player.y;
              if (prevTop >= p.y + p.h && newTop <= p.y + p.h) {
                player.y = p.y + p.h;
                player.vy = 0;
              }
            }
          }

          // rastro de tinta
          if (Math.random() < 0.5) {
            trail.push({
              x: player.x + player.w / 2,
              y: player.y + player.h / 2,
              life: 1,
            });
          }
          trail.forEach((t) => (t.life -= 0.03));
          trail = trail.filter((t) => t.life > 0);

          // cámara: horizontal siempre centrada en la columna de texto,
          // vertical sigue al jugador a medida que baja
          const targetCamY = player.y - viewH / 2 + player.h / 2;
          camX += (getColCenterX() - viewW / 2 - camX) * 0.15;
          camY += (targetCamY - camY) * 0.12;

          // cajas de navegación (izquierda = capítulo anterior, derecha = siguiente)
          if (navCooldown > 0) navCooldown--;
          const playerScreen = {
            x: player.x - camX,
            y: player.y - camY,
            w: player.w,
            h: player.h,
          };
          const boxes = getNavBoxes();
          if (navCooldown <= 0 && !transitioning) {
            if (aabbOverlap(playerScreen, boxes.right)) {
              transitioning = true;
              playNextNavNote();
              navHitRight = HIT_ANIM_FRAMES;
              navImpactRight = makeImpactData(playerScreen, boxes.right, 1);
              // retroceso: lo empuja para atrás (izquierda) y un poco hacia
              // arriba, como un choque real, en vez de quedar clavado
              player.vx = -NAV_KNOCKBACK_VX;
              player.vy = NAV_KNOCKBACK_VY;
              const isFinalLevel =
                getLevelIndex(pageIndex) ===
                (window.FINAL_LEVEL_INDEX ?? LEVELS.length - 1);
              setTimeout(() => {
                if (isFinalLevel) {
                  endGame();
                  // transitioning se queda en true: el juego se congela
                  // mientras funde a blanco y recarga
                } else {
                  goToPage(pageIndex + 1, "siguiente capítulo...");
                  transitioning = false;
                }
              }, 1000);
            } else if (aabbOverlap(playerScreen, boxes.left) && pageIndex > 0) {
              transitioning = true;
              playNextNavNote();
              navHitLeft = HIT_ANIM_FRAMES;
              navImpactLeft = makeImpactData(playerScreen, boxes.left, -1);
              // idem, pero empuja para el otro lado (derecha)
              player.vx = NAV_KNOCKBACK_VX;
              player.vy = NAV_KNOCKBACK_VY;
              setTimeout(() => {
                goToPage(pageIndex - 1, "capítulo anterior...");
                transitioning = false;
              }, 1000);
            }
          }

          // (se quitó la meta por contacto con el último caracter: el único
          // modo de cambiar de nivel es tocando las flechas de navegación)

          // caída al vacío
          if (
            !transitioning &&
            (player.y > page.worldBottom ||
              player.x < -80 ||
              player.x > page.worldWidth + 80)
          ) {
            deaths++;
            const hudDeaths = document.getElementById("hudDeaths");
            if (hudDeaths) hudDeaths.textContent = deaths;
            resetPlayerToPageStart();
            camX = getColCenterX() - viewW / 2;
            camY = player.y - viewH / 2 + player.h / 2;
            if (hudMsg) {
              hudMsg.textContent = "caíste en el blanco...";
              setTimeout(() => {
                if (hudMsg) hudMsg.textContent = "";
              }, 1200);
            }
            return;
          }
        }

        // ---------- Dibujo ----------
        function drawPaperTexture() {
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, viewW, viewH);
          ctx.save();
          ctx.globalAlpha = 0.025;
          for (let i = 0; i < 120; i++) {
            ctx.fillStyle = "#000";
            const rx = Math.random() * viewW,
              ry = Math.random() * viewH,
              rr = Math.random() * 1.4;
            ctx.beginPath();
            ctx.arc(rx, ry, rr, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }

        function draw() {
          drawPaperTexture();
          ctx.save();
          ctx.translate(-camX, -camY);

          // guías de renglón (líneas tenues del papel)
          ctx.strokeStyle = "rgba(28,28,28,0.08)";
          ctx.lineWidth = 1;
          for (let r = 0; r < LINES_PER_COL; r++) {
            const y = PAGE_TOP + r * LINE_H + PLATFORM_H + 10;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(page.worldWidth, y);
            ctx.stroke();
          }

          // vacío entre columnas (el blanco de la página)
          ctx.fillStyle = "rgba(28,28,28,0.035)";
          for (let c = 0; c < NUM_COLS - 1; c++) {
            const gapX =
              COL_LEFT_START + (c + 1) * CHARS_PER_LINE * CHAR_W + c * COL_GAP;
            ctx.fillRect(
              gapX,
              PAGE_TOP - 40,
              COL_GAP,
              page.worldBottom - PAGE_TOP + 80,
            );
          }

          // letras / plataformas
          ctx.textBaseline = "alphabetic";
          for (const p of page.platforms) {
            ctx.fillStyle = "#1c1c1c";
            ctx.font = p.isTitle
              ? `900 ${FONT_SIZE + 2}px 'Special Elite', monospace`
              : `${FONT_SIZE}px 'Special Elite', monospace`;
            ctx.fillText(p.char, p.x - 2, p.y + FONT_SIZE - 4);
            // pequeña base de plataforma (sombra bajo la letra)
            ctx.fillStyle = "rgba(28,28,28,0.15)";
            ctx.fillRect(p.x, p.y + FONT_SIZE - 2, p.w, 2);
          }

          // bandera de meta

          // rastro de tinta
          for (const t of trail) {
            ctx.fillStyle = `rgba(28,28,28,${t.life * 0.3})`;
            ctx.beginPath();
            ctx.arc(t.x, t.y, 2.2 * t.life, 0, Math.PI * 2);
            ctx.fill();
          }

          // jugador (gota de tinta)
          ctx.save();
          ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
          ctx.fillStyle = "#1c1c1c";
          ctx.beginPath();
          ctx.ellipse(0, 1, 4.5, 5, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#a9812f";
          ctx.beginPath();
          ctx.arc(player.facing * 1.6, -1.4, 1.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          ctx.restore();

          // flechas de navegación: dibujadas exactamente sobre la caja de colisión real
          const boxes = getNavBoxes();
          drawNavArrow(
            boxes.left,
            -1,
            navHitLeft,
            pageIndex > 0,
            navImpactLeft,
          );
          drawNavArrow(boxes.right, 1, navHitRight, true, navImpactRight);
        }

        // respuesta de un sistema críticamente amortiguado a un impulso instantáneo:
        // sube rápido a un único pico y decae sin rebotar ni oscilar — así se mueve
        // algo real que recibe un golpe seco, a diferencia de un resorte de dibujo animado
        function impulseEnvelope(p, tau) {
          const t = p / tau;
          return t * Math.exp(1 - t);
        }

        function drawNavArrow(box, dir, hitFrames, active, impact) {
          const cx = box.x + box.w / 2,
            cy = box.y + box.h / 2;
          ctx.save();
          ctx.globalAlpha = active ? 1 : 0.22;

          let offsetX = 0,
            offsetY = 0,
            scale = 1,
            rotation = 0;

          if (hitFrames > 0 && impact) {
            // progreso 0 -> 1 a lo largo de todo el segundo de animación
            const p = 1 - hitFrames / HIT_ANIM_FRAMES;

            // qué tan fuerte fue el impacto (velocidad total del personaje al pisarla)
            const speed = Math.min(Math.hypot(impact.vx, impact.vy) / 6, 1.8);

            // respuesta de un choque real: pico único, sin rebotar ni oscilar
            const crunch = impulseEnvelope(p, 0.045); // el instante exacto del golpe
            const settle = impulseEnvelope(p, 0.16); // el asentamiento del cuerpo

            // es una plataforma suspendida: cede hacia ABAJO por el peso del
            // impacto, nunca se desplaza para los costados
            offsetY = crunch * (5 + speed * 6);

            // gira apenas hacia el lado donde pegó: si pisó la mitad izquierda
            // gira contra-reloj, si pisó la mitad derecha gira en sentido reloj
            const spinDir = Math.sign(impact.offsetX || 0.001);
            const eccentricity = Math.abs(impact.offsetX); // qué tan lejos del centro pisó
            rotation =
              spinDir * (0.05 + eccentricity * 0.12 + speed * 0.05) * settle;

            // pequeña compresión vertical en el instante del golpe
            scale = 1 - crunch * (0.1 + speed * 0.08);
          }

          ctx.translate(cx + offsetX, cy + offsetY);
          ctx.rotate(rotation);
          ctx.scale(dir * scale, scale); // dir invierte la flecha para que apunte a la izquierda

          ctx.fillStyle = "#1c1c1c";
          const L = ARROW_L;
          ctx.beginPath();
          ctx.moveTo(-L, -L * 0.07);
          ctx.lineTo(L * 0.45, -L * 0.07);
          ctx.lineTo(L * 0.45, -L * 0.32);
          ctx.lineTo(L, 0);
          ctx.lineTo(L * 0.45, L * 0.32);
          ctx.lineTo(L * 0.45, L * 0.07);
          ctx.lineTo(-L, L * 0.07);
          ctx.closePath();
          ctx.fill();

          ctx.restore();
        }

        function loop() {
          // estos decrementos van acá (y no en update) para que la animación de
          // impacto siga corriendo aunque el juego esté "congelado" por transitioning
          if (navHitLeft > 0) {
            navHitLeft--;
            if (navHitLeft === 0) navImpactLeft = null;
          }
          if (navHitRight > 0) {
            navHitRight--;
            if (navHitRight === 0) navImpactRight = null;
          }
          update();
          draw();
          requestAnimationFrame(loop);
        }

        // ---------- Flujo de pantallas ----------
